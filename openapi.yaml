openapi: 3.0.3
info:
  title: uwgsocks-ui Management API
  version: 0.1.0-beta.5
  description: >
    Browser and automation API for `simple-wireguard-server` (`uwgsocks-ui`).
    The UI accepts either a bearer token or the session cookie
    `uwgsocks_ui_token`. Endpoints wrapped in the server's sudo middleware
    return HTTP `428 Precondition Required` with a JSON body when the caller
    must re-authenticate before making a sensitive change.
servers:
  - url: /
security:
  - bearerAuth: []
  - sessionCookie: []
tags:
  - name: Auth
  - name: Profile
  - name: Peers
  - name: Users
  - name: Groups
  - name: ACLs
  - name: Forwards
  - name: Transports
  - name: Settings
  - name: Proxy
  - name: Services
  - name: TURN
  - name: Spec
paths:
  /api/login:
    post:
      tags: [Auth]
      summary: Log in with username and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '202':
          description: Password accepted, but TOTP is still required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginNeeds2FAResponse'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'

  /api/logout:
    post:
      tags: [Auth]
      summary: Revoke the current session token
      responses:
        '204':
          description: Logged out.

  /api/auth/reauth:
    post:
      tags: [Auth]
      summary: Refresh sudo authorization for sensitive actions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReauthRequest'
      responses:
        '204':
          description: Sudo authorization refreshed.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'

  /api/auth/lock:
    post:
      tags: [Auth]
      summary: Clear active sudo authorization for the current session
      responses:
        '204':
          description: Sudo state cleared.

  /api/auth/methods:
    get:
      tags: [Auth]
      summary: Discover enabled login methods
      security: []
      responses:
        '200':
          description: Login capabilities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMethodsResponse'

  /api/auth/hmac-nonce:
    get:
      tags: [Auth]
      summary: Compute the server HMAC for a nonce
      parameters:
        - name: nonce
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Hex-encoded HMAC.
          content:
            text/plain:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'

  /api/oidc/login:
    get:
      tags: [Auth]
      summary: Start an OIDC login flow
      security: []
      responses:
        '302':
          description: Redirects the browser to the configured OIDC provider.
          headers:
            Location:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '502':
          $ref: '#/components/responses/PlainTextBadGateway'

  /api/oidc/callback:
    get:
      tags: [Auth]
      summary: Finish the OIDC login flow
      security: []
      parameters:
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: HTML page that stores the issued token and redirects to `/app`.
          content:
            text/html:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '502':
          $ref: '#/components/responses/PlainTextBadGateway'

  /api/me:
    get:
      tags: [Profile]
      summary: Return the current authenticated user and capabilities
      responses:
        '200':
          description: Current user profile and UI capabilities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
    patch:
      tags: [Profile]
      summary: Update the current user's password
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '204':
          description: Password updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/me/2fa/setup:
    post:
      tags: [Profile]
      summary: Generate a new TOTP secret for the current user
      description: Requires active sudo authorization.
      responses:
        '200':
          description: New TOTP enrollment material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TOTPSetupResponse'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/me/2fa/enable:
    post:
      tags: [Profile]
      summary: Enable TOTP for the current user
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TOTPEnableRequest'
      responses:
        '204':
          description: TOTP enabled.
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/me/2fa:
    delete:
      tags: [Profile]
      summary: Disable TOTP for the current user
      description: Requires active sudo authorization.
      responses:
        '204':
          description: TOTP disabled.
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/me/proxy-credentials:
    get:
      tags: [Proxy]
      summary: List the current user's HTTP CONNECT proxy credentials
      responses:
        '200':
          description: Proxy credentials owned by the current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessProxyCredential'
    post:
      tags: [Proxy]
      summary: Create an HTTP CONNECT proxy credential for the current user
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MyProxyCredentialCreateRequest'
      responses:
        '201':
          description: Created credential with the one-time password material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyProxyCredentialCreateResponse'
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/me/proxy-credentials/{id}:
    delete:
      tags: [Proxy]
      summary: Delete one of the current user's proxy credentials
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/PlainTextUnauthorized'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/share/{token}:
    get:
      tags: [Peers]
      summary: Download a shareable WireGuard client config payload
      security: []
      description: >
        For end-to-end encrypted peers, the caller must also send the
        `X-Nonce-Hash` header that matches the device's stored nonce hash.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/NonceHashHeader'
      responses:
        '200':
          description: Share link payload, including client config material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedConfigResponse'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '410':
          description: Link has already been used or expired.
          content:
            text/plain:
              schema:
                type: string

  /api/peers:
    get:
      tags: [Peers]
      summary: List visible peers
      responses:
        '200':
          description: Peers visible to the current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Peer'
    post:
      tags: [Peers]
      summary: Create a new peer for the current user
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeerCreateRequest'
      responses:
        '200':
          description: Peer created. The response returns the assigned addresses and key availability.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeerCreateResponse'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/peers/{id}:
    patch:
      tags: [Peers]
      summary: Update a peer
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PeerUpdateRequest'
      responses:
        '200':
          description: Peer updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [Peers]
      summary: Delete a peer
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Peer deleted.
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/peers/{id}/private:
    get:
      tags: [Peers]
      summary: Return private key material for a peer
      description: >
        Requires active sudo authorization. For end-to-end encrypted peers, the
        caller must send `X-Nonce-Hash`.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - $ref: '#/components/parameters/NonceHashHeader'
      responses:
        '200':
          description: Private config material for the peer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PeerPrivate'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/peers/{id}/ping:
    post:
      tags: [Peers]
      summary: Ask the managed daemon to ping a peer's first assigned address
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Daemon ping result passthrough.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlexibleObject'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '502':
          $ref: '#/components/responses/PlainTextBadGateway'

  /api/peers/{id}/share-links:
    post:
      tags: [Peers]
      summary: Create a shareable config link for a peer
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareLinkCreateRequest'
      responses:
        '200':
          description: Share link created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareLinkCreateResponse'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/distribute-peers:
    get:
      tags: [Peers]
      summary: List peers that are distributed to other clients
      responses:
        '200':
          description: Distributed peer advertisements.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DistributePeerInfo'

  /api/admin/users:
    get:
      tags: [Users]
      summary: List all users
      description: Available to admins and moderators.
      responses:
        '200':
          description: Users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
    post:
      tags: [Users]
      summary: Create a user
      description: Requires active sudo authorization. Available to admins and moderators.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        '201':
          description: User created.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/users/{id}:
    patch:
      tags: [Users]
      summary: Update a user
      description: Requires active sudo authorization. Available to admins and moderators.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [Users]
      summary: Delete a user
      description: Requires active sudo authorization. Available to admins and moderators.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: User deleted.
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/users/{id}/2fa:
    delete:
      tags: [Users]
      summary: Clear TOTP enrollment for a user
      description: Requires active sudo authorization. Available to admins and moderators.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: TOTP enrollment removed.
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/tags:
    get:
      tags: [Groups]
      summary: List all groups
      responses:
        '200':
          description: Groups.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
    post:
      tags: [Groups]
      summary: Create a group
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
      responses:
        '201':
          description: Group created.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/tags/{id}:
    patch:
      tags: [Groups]
      summary: Update a group
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
      responses:
        '200':
          description: Group updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [Groups]
      summary: Delete a group
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Group deleted.
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/acls:
    get:
      tags: [ACLs]
      summary: List ACL rules
      responses:
        '200':
          description: ACL rules in sort order.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ACLRule'
    post:
      tags: [ACLs]
      summary: Create an ACL rule
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ACLRule'
      responses:
        '201':
          description: ACL rule created.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/acls/{id}:
    patch:
      tags: [ACLs]
      summary: Update an ACL rule
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ACLRule'
      responses:
        '200':
          description: ACL rule updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [ACLs]
      summary: Delete an ACL rule
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: ACL rule deleted.
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/acls/reorder:
    post:
      tags: [ACLs]
      summary: Replace ACL sort order values in bulk
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/ACLReorderItem'
      responses:
        '200':
          description: ACL ordering updated.
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/acl-tokens:
    get:
      tags: [ACLs]
      summary: Search valid ACL selector tokens
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Matching users, groups, peers, and raw CIDR tokens.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ACLToken'

  /api/admin/forwards:
    get:
      tags: [Forwards]
      summary: List local and reverse forwards
      responses:
        '200':
          description: Forward definitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TunnelForward'
    post:
      tags: [Forwards]
      summary: Create a forward
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TunnelForward'
      responses:
        '201':
          description: Forward created.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/forwards/{id}:
    patch:
      tags: [Forwards]
      summary: Update a forward
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TunnelForward'
      responses:
        '200':
          description: Forward updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [Forwards]
      summary: Delete a forward
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Forward deleted.
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/transports:
    get:
      tags: [Transports]
      summary: List managed transports
      responses:
        '200':
          description: Transport definitions, merged with live runtime state.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TransportConfig'
    post:
      tags: [Transports]
      summary: Create a transport
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransportConfig'
      responses:
        '201':
          description: Transport created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransportConfig'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/transports/{id}:
    patch:
      tags: [Transports]
      summary: Update a transport
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransportConfig'
      responses:
        '200':
          description: Transport updated.
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [Transports]
      summary: Delete a transport
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Transport deleted.
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/config:
    get:
      tags: [Settings]
      summary: Read the full admin settings map
      responses:
        '200':
          description: Full key/value settings map.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigMap'
    post:
      tags: [Settings]
      summary: Update key/value settings
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigMap'
      responses:
        '200':
          description: Settings updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/yaml:
    get:
      tags: [Settings]
      summary: Read generated and custom YAML
      parameters:
        - name: sensitive
          in: query
          required: false
          schema:
            type: integer
            enum: [1]
          description: Include the saved custom YAML when sudo is active.
        - name: include_effective
          in: query
          required: false
          schema:
            type: integer
            enum: [1]
          description: Include the effective generated file when sudo is active.
      responses:
        '200':
          description: YAML settings and previews.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YAMLConfigResponse'
    post:
      tags: [Settings]
      summary: Save the optional YAML override
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/YAMLSaveRequest'
      responses:
        '204':
          description: YAML override saved.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/restart:
    post:
      tags: [Settings]
      summary: Restart the managed `uwgsocks` and TURN daemons
      description: Requires active sudo authorization.
      responses:
        '200':
          description: Restart completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestartResponse'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/config/public:
    get:
      tags: [Settings]
      summary: Read the public config map exposed to authenticated users
      responses:
        '200':
          description: Public key/value settings map used by the UI and config downloads.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicConfigMap'

  /api/admin/stats:
    get:
      tags: [Settings]
      summary: Read raw `uwgsocks` runtime status from the managed daemon
      responses:
        '200':
          description: Daemon status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaemonStatusSnapshot'

  /api/services:
    get:
      tags: [Services]
      summary: List exposed services visible to the current user
      responses:
        '200':
          description: Services the caller can browse through the UI ingress layer.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VisibleExposedService'

  /service-auth:
    get:
      tags: [Services]
      summary: Browser hand-off page for service authentication
      description: >
        Requires the session cookie. The response is an HTML auto-submit page
        that POSTs an auth token to the target service host.
      security:
        - sessionCookie: []
      parameters:
        - name: service
          in: query
          required: true
          schema:
            type: string
        - name: next
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Auto-submit HTML page.
          content:
            text/html:
              schema:
                type: string
        '302':
          description: Redirect to `/login` when the browser session is missing or expired.
          headers:
            Location:
              schema:
                type: string
        '404':
          $ref: '#/components/responses/PlainTextNotFound'

  /api/admin/proxy-credentials:
    get:
      tags: [Proxy]
      summary: List all HTTP CONNECT proxy credentials
      responses:
        '200':
          description: Proxy credentials across all users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessProxyCredential'
    post:
      tags: [Proxy]
      summary: Create an HTTP CONNECT proxy credential
      description: Requires active sudo authorization.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminProxyCredentialCreateRequest'
      responses:
        '201':
          description: Created credential with the one-time password material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminProxyCredentialCreateResponse'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/proxy-credentials/{id}:
    delete:
      tags: [Proxy]
      summary: Delete an HTTP CONNECT proxy credential
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Deleted.
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/exposed-services:
    get:
      tags: [Services]
      summary: List all exposed services
      responses:
        '200':
          description: Exposed services with the externally reachable URL and connect helper.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VisibleExposedService'
    post:
      tags: [Services]
      summary: Create an exposed service
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExposedService'
      responses:
        '201':
          description: Service created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExposedService'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/exposed-services/{id}:
    patch:
      tags: [Services]
      summary: Update an exposed service
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExposedService'
      responses:
        '200':
          description: Service updated.
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [Services]
      summary: Delete an exposed service
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: Service deleted.
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/turn/listeners:
    get:
      tags: [TURN]
      summary: List TURN listeners visible to authenticated users
      responses:
        '200':
          description: TURN listener definitions with current bound address where available.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TURNHostedListener'

  /api/admin/turn/listeners:
    get:
      tags: [TURN]
      summary: List TURN listeners
      responses:
        '200':
          description: TURN listener definitions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TURNHostedListener'
    post:
      tags: [TURN]
      summary: Create a TURN listener
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TURNHostedListener'
      responses:
        '201':
          description: TURN listener created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TURNHostedListener'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/turn/listeners/{id}:
    patch:
      tags: [TURN]
      summary: Update a TURN listener
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TURNHostedListener'
      responses:
        '200':
          description: TURN listener updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TURNHostedListener'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'
    delete:
      tags: [TURN]
      summary: Delete a TURN listener
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: TURN listener deleted.
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/admin/turn/credentials:
    get:
      tags: [TURN]
      summary: List all TURN credentials
      responses:
        '200':
          description: TURN credentials across all users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TURNCredential'

  /api/admin/turn/status:
    get:
      tags: [TURN]
      summary: Read raw status from the managed TURN daemon
      responses:
        '200':
          description: TURN daemon status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TURNDaemonStatus'

  /api/me/turn-credentials:
    get:
      tags: [TURN]
      summary: List the current user's TURN credentials
      responses:
        '200':
          description: TURN credentials owned by the current user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TURNCredential'
    post:
      tags: [TURN]
      summary: Create a TURN credential for the current user
      description: Requires active sudo authorization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TURNCredentialCreateRequest'
      responses:
        '201':
          description: TURN credential created with one-time password material.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TURNCredentialCreateResponse'
        '400':
          $ref: '#/components/responses/PlainTextBadRequest'
        '403':
          $ref: '#/components/responses/PlainTextForbidden'
        '409':
          $ref: '#/components/responses/PlainTextConflict'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/me/turn-credentials/{id}:
    delete:
      tags: [TURN]
      summary: Delete one of the current user's TURN credentials
      description: Requires active sudo authorization.
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '204':
          description: TURN credential deleted.
        '404':
          $ref: '#/components/responses/PlainTextNotFound'
        '428':
          $ref: '#/components/responses/SudoRequired'

  /api/openapi.yaml:
    get:
      tags: [Spec]
      summary: Download the OpenAPI schema bundled with the UI
      security: []
      responses:
        '200':
          description: OpenAPI document.
          content:
            application/yaml:
              schema:
                type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque
    sessionCookie:
      type: apiKey
      in: cookie
      name: uwgsocks_ui_token

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
    NonceHashHeader:
      name: X-Nonce-Hash
      in: header
      required: false
      schema:
        type: string
      description: Required when accessing end-to-end encrypted peer key material.

  responses:
    PlainTextBadRequest:
      description: Request validation failed.
      content:
        text/plain:
          schema:
            type: string
    PlainTextUnauthorized:
      description: Authentication failed or session is missing.
      content:
        text/plain:
          schema:
            type: string
    PlainTextForbidden:
      description: Caller does not have permission for the requested object or action.
      content:
        text/plain:
          schema:
            type: string
    PlainTextNotFound:
      description: Requested resource was not found.
      content:
        text/plain:
          schema:
            type: string
    PlainTextConflict:
      description: Request conflicts with current state or uniqueness constraints.
      content:
        text/plain:
          schema:
            type: string
    PlainTextBadGateway:
      description: Upstream daemon or OIDC provider call failed.
      content:
        text/plain:
          schema:
            type: string
    SudoRequired:
      description: The caller must re-authenticate before this sensitive action can proceed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SudoRequiredResponse'

  schemas:
    FlexibleObject:
      type: object
      additionalProperties: {}

    ConfigMap:
      type: object
      additionalProperties:
        type: string
      description: Free-form key/value settings map backed by the `global_configs` table.

    PublicConfigMap:
      allOf:
        - $ref: '#/components/schemas/ConfigMap'
      description: >
        Authenticated-user view of public server settings. Values are returned as
        strings, including JSON-encoded `client_transport_profiles`.

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        totp_code:
          type: string
          description: Required only after the server responds with `requires_2fa=true`.

    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LoginNeeds2FAResponse:
      type: object
      required: [requires_2fa]
      properties:
        requires_2fa:
          type: boolean
          enum: [true]

    AuthMethodsResponse:
      type: object
      properties:
        password:
          type: boolean
        oidc_enabled:
          type: boolean
        oidc_login:
          type: string

    ReauthRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
        totp_code:
          type: string

    SudoRequiredResponse:
      type: object
      properties:
        error:
          type: string
        sudo_required:
          type: boolean
          enum: [true]

    MeResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        is_admin:
          type: boolean
        is_moderator:
          type: boolean
        role:
          type: string
          enum: [admin, moderator, user]
        totp_enabled:
          type: boolean
        oidc_login:
          type: boolean
        sudo_active:
          type: boolean
        sudo_expires_at:
          type: string
          format: date-time
        can_manage_users:
          type: boolean
        can_manage_settings:
          type: boolean
        can_manage_acls:
          type: boolean
        can_manage_transports:
          type: boolean
        can_manage_forwards:
          type: boolean
        can_manage_turn:
          type: boolean

    UpdateMeRequest:
      type: object
      properties:
        password:
          type: string
        old_password:
          type: string

    TOTPSetupResponse:
      type: object
      properties:
        secret:
          type: string
        otpauth_url:
          type: string

    TOTPEnableRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        token:
          type: string
        is_admin:
          type: boolean
        max_configs:
          type: integer
        totp_enabled:
          type: boolean
        oidc_provider:
          type: string
        oidc_subject:
          type: string
        primary_group:
          type: string
        groups:
          type: string
          description: Comma-separated additional group memberships.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        peers:
          type: array
          items:
            $ref: '#/components/schemas/Peer'

    UserCreateRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        is_admin:
          type: boolean
        tags:
          type: string
          description: Legacy alias for `groups`.
        groups:
          type: string
        primary_group:
          type: string

    UserUpdateRequest:
      type: object
      properties:
        tags:
          type: string
          description: Legacy alias for `groups`.
        groups:
          type: string
        primary_group:
          type: string
        is_admin:
          type: boolean
        max_configs:
          type: integer
        password:
          type: string

    PeerTrafficPoint:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        receive_bytes:
          type: integer
          format: uint64
        transmit_bytes:
          type: integer
          format: uint64
        total_bytes:
          type: integer
          format: uint64
        receive_delta:
          type: integer
          format: uint64
        transmit_delta:
          type: integer
          format: uint64
        total_delta:
          type: integer
          format: uint64

    Peer:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        username:
          type: string
        name:
          type: string
        primary_group:
          type: string
        groups:
          type: string
        assigned_ips:
          type: string
        keepalive:
          type: integer
        endpoint_ip:
          type: string
        public_key:
          type: string
        nonce_hash:
          type: string
        preshared_key:
          type: string
        encrypted_private_key:
          type: string
        is_e2e:
          type: boolean
        enabled:
          type: boolean
        is_manual_key:
          type: boolean
        is_owner:
          type: boolean
        static_endpoint:
          type: string
        expires_at:
          type: string
          format: date-time
        traffic_upload_bps:
          type: integer
          format: int64
        traffic_download_bps:
          type: integer
          format: int64
        traffic_latency_ms:
          type: integer
        is_distribute:
          type: boolean
        distribute_endpoint:
          type: string
        mesh_trust:
          type: string
          enum: [untrusted, trusted_always, trusted_if_dynamic_acls]
        peer_sync_enabled:
          type: boolean
        last_handshake_time:
          type: string
        transmit_bytes:
          type: integer
          format: uint64
        receive_bytes:
          type: integer
          format: uint64
        has_handshake:
          type: boolean
        has_private_key_material:
          type: boolean
        traffic_history:
          type: array
          items:
            $ref: '#/components/schemas/PeerTrafficPoint'
        transport_name:
          type: string
        transport_state:
          type: string
        transport_endpoint:
          type: string
        transport_source_addr:
          type: string
        transport_carrier_remote_addr:
          type: string

    PeerPrivate:
      allOf:
        - $ref: '#/components/schemas/Peer'

    TrafficShaper:
      type: object
      properties:
        upload_bps:
          type: integer
          format: int64
        download_bps:
          type: integer
          format: int64
        latency_ms:
          type: integer

    PeerCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        tags:
          type: string
        groups:
          type: string
        public_key:
          type: string
        nonce_hash:
          type: string
        encrypted_private_key:
          type: string
        requested_ip:
          type: string
        keepalive:
          type: integer
        static_endpoint:
          type: string
        is_manual_key:
          type: boolean
        peer_sync_enabled:
          type: boolean
        expires_at:
          type: string
          format: date-time
        traffic_shaper:
          $ref: '#/components/schemas/TrafficShaper'

    PeerCreateResponse:
      type: object
      properties:
        id:
          type: integer
        assigned_ips:
          type: string
        public_key:
          type: string
        has_private_key_material:
          type: boolean

    PeerUpdateRequest:
      type: object
      properties:
        name:
          type: string
        tags:
          type: string
        groups:
          type: string
        assigned_ips:
          type: string
        keepalive:
          type: integer
        enabled:
          type: boolean
        static_endpoint:
          type: string
        expires_at:
          type: string
          format: date-time
        is_distribute:
          type: boolean
        distribute_endpoint:
          type: string
        mesh_trust:
          type: string
          enum: [untrusted, trusted_always, trusted_if_dynamic_acls]
        peer_sync_enabled:
          type: boolean
        traffic_shaper:
          $ref: '#/components/schemas/TrafficShaper'

    DistributePeerInfo:
      type: object
      properties:
        public_key:
          type: string
        allowed_ips:
          type: string
        endpoint:
          type: string
        name:
          type: string

    ShareLinkCreateRequest:
      type: object
      properties:
        one_use:
          type: boolean
        expires_at:
          type: string
          format: date-time

    ShareLinkCreateResponse:
      type: object
      properties:
        token:
          type: string
        one_use:
          type: boolean
        expires_at:
          type: string
          format: date-time

    ClientTransportProfile:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        base:
          type: string
        endpoint:
          type: string
        transport:
          type: string
        directive_tcp:
          type: string
        directive_turn:
          type: string
        directive_url:
          type: string
        preferred:
          type: boolean

    SharedConfigResponse:
      type: object
      properties:
        peer_name:
          type: string
        download_name:
          type: string
        public_key:
          type: string
        assigned_ips:
          type: string
        keepalive:
          type: integer
        is_e2e:
          type: boolean
        server_public_key:
          type: string
        server_endpoint:
          type: string
        default_transport:
          type: string
        client_dns:
          type: string
        mtu:
          type: string
        enable_client_ipv6:
          type: string
        client_allowed_ips:
          type: string
        client_config_tcp:
          type: string
        client_config_turn_url:
          type: string
        client_config_skipverifytls:
          type: string
        client_config_url:
          type: string
        client_config_control_url:
          type: string
        client_transport_profiles:
          type: array
          items:
            $ref: '#/components/schemas/ClientTransportProfile'
        peer_sync_enabled:
          type: boolean
        preshared_key:
          type: string
        private_key:
          type: string
        encrypted_private_key:
          type: string
        one_use:
          type: boolean
        expires_at:
          type: string
          format: date-time
        distribute_peers:
          type: array
          items:
            $ref: '#/components/schemas/DistributePeerInfo'

    Group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        subnet:
          type: string
          description: IPv4 group subnet. `auto` is accepted on create.
        subnet_ipv6:
          type: string
        parent_groups:
          type: string
        extra_cidrs:
          type: string
        built_in:
          type: boolean

    ACLRule:
      type: object
      properties:
        id:
          type: integer
        list_name:
          type: string
          enum: [inbound, outbound, relay]
        name:
          type: string
        action:
          type: string
          enum: [allow, deny]
        src:
          type: string
        src_users:
          type: string
        src_tags:
          type: string
        src_peers:
          type: string
        dst:
          type: string
        dst_users:
          type: string
        dst_tags:
          type: string
        dst_peers:
          type: string
        proto:
          type: string
          enum: ['', any, tcp, udp, icmp]
        dport:
          type: string
