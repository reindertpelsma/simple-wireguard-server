name: Release Builds

on:
  push:
    tags:
      - '*'
      - '*/*'

permissions:
  contents: write
  packages: write

jobs:
  frontend:
    name: frontend dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  build-uwgsocks-ui:
    name: uwgsocks-ui ${{ matrix.goos }} ${{ matrix.goarch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: uwgsocks-ui-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: uwgsocks-ui-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: uwgsocks-ui-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: uwgsocks-ui-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact_name: uwgsocks-ui-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact_name: uwgsocks-ui-windows-arm64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Build uwgsocks-ui
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          go build -trimpath -ldflags='-s -w' -o "release/${{ matrix.artifact_name }}" .

      - name: Show artifact details
        shell: bash
        run: |
          ls -lh release
          file "release/${{ matrix.artifact_name }}" || true

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}
          if-no-files-found: error

  build-uwgkm:
    name: uwgkm linux ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            artifact_name: uwgkm-linux-amd64
          - goarch: arm64
            artifact_name: uwgkm-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: syswg/go.mod

      - name: Build uwgkm
        working-directory: syswg
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p ../release
          go build -trimpath -ldflags='-s -w' -o "../release/${{ matrix.artifact_name }}" .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release/${{ matrix.artifact_name }}
          if-no-files-found: error

  publish-release:
    name: publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-uwgsocks-ui
      - build-uwgkm
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Show release contents
        run: ls -lh release

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  publish-container:
    name: publish container image
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@v4

      - name: Checkout userspace-wireguard-socks source
        uses: actions/checkout@v4
        with:
          repository: reindertpelsma/userspace-wireguard-socks
          path: userspace-wireguard-socks

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/simple-wireguard-server
          tags: |
            type=ref,event=tag

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-contexts: |
            uwgsocks-src=./userspace-wireguard-socks
